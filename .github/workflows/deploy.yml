name: Deploy → EC2

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: SSH Deploy to EC2
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            set -e
            echo "📦 Checking repo..."
            if [ ! -d ~/hi-app/.git ]; then
              git clone https://github.com/EXE-Hi-Project/Hi-BE.git ~/hi-app
            fi
            cd ~/hi-app
            git remote set-url origin https://github.com/EXE-Hi-Project/Hi-BE.git
            git fetch origin main
            git reset --hard origin/main

            echo "☕ Verifying Java runtime..."
            if ! command -v java >/dev/null 2>&1; then
              sudo apt-get update
              sudo apt-get install -y openjdk-17-jre-headless
            fi

            echo "🛠️  Building Spring Boot jar..."
            chmod +x ./mvnw
            ./mvnw clean package -DskipTests

            echo "🌱 Loading environment..."
            if [ -f .env ]; then
              set -a
              . ./.env
              set +a
            fi

            echo "♻️  Restarting PM2 (Java)..."
            if pm2 describe hi-api >/dev/null 2>&1; then
              pm2 delete hi-api
            fi
            pm2 start "java -jar /home/${USER}/hi-app/target/hi-api-1.0.0.jar" --name hi-api --update-env
            pm2 save

            echo "✅ Health check..."
            sleep 8
            curl -f http://localhost:5000/health || (echo "❌ Health check failed!" && exit 1)

            echo "🎉 Deploy BE hoàn tất!"
