name: Deploy → EC2

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: SSH Deploy to EC2
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID || vars.GOOGLE_CLIENT_ID || '315410090730-6bhvppf1p0jlja3s0o4es8pbc1ob2srm.apps.googleusercontent.com' }}
          PAYOS_CLIENT_ID: ${{ secrets.PAYOS_CLIENT_ID }}
          PAYOS_API_KEY: ${{ secrets.PAYOS_API_KEY }}
          PAYOS_CHECKSUM_KEY: ${{ secrets.PAYOS_CHECKSUM_KEY }}
          CLIENT_URL: ${{ vars.CLIENT_URL || 'https://hilover.space' }}
          PAYMENT_RETURN_ALLOWED_ORIGINS: ${{ vars.PAYMENT_RETURN_ALLOWED_ORIGINS || 'https://hilover.space,https://www.hilover.space' }}
          FRONTEND_URL: ${{ vars.FRONTEND_URL || 'https://hilover.space' }}
          FRONTEND_URLS: ${{ vars.FRONTEND_URLS || 'https://hilover.space,https://www.hilover.space' }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          envs: GOOGLE_CLIENT_ID,PAYOS_CLIENT_ID,PAYOS_API_KEY,PAYOS_CHECKSUM_KEY,CLIENT_URL,PAYMENT_RETURN_ALLOWED_ORIGINS,FRONTEND_URL,FRONTEND_URLS
          script: |
            set -e
            echo "📦 Checking repo..."
            if [ ! -d ~/hi-app/.git ]; then
              git clone https://github.com/EXE-Hi-Project/Hi-BE.git ~/hi-app
            fi
            cd ~/hi-app
            git remote set-url origin https://github.com/EXE-Hi-Project/Hi-BE.git
            git fetch origin main
            git reset --hard origin/main

            echo "🔐 Ensuring runtime secrets..."
            touch .env
            upsert_env() {
              KEY="$1"
              VALUE="$2"
              if [ -z "$VALUE" ]; then
                return 0
              fi
              ESCAPED_VALUE=$(printf '%s' "$VALUE" | sed 's/[\/&]/\\&/g')
              if grep -q "^${KEY}=" .env; then
                sed -i "s/^${KEY}=.*/${KEY}=${ESCAPED_VALUE}/" .env
              else
                printf '%s=%s\n' "$KEY" "$VALUE" >> .env
              fi
            }

            JWT_SECRET_CURRENT=$(grep -E '^JWT_SECRET=' .env | tail -n 1 | cut -d= -f2- || true)
            if [ -z "$JWT_SECRET_CURRENT" ] || echo "$JWT_SECRET_CURRENT" | grep -q 'HiLover_Secret_2026_ChangeMe' || [ ${#JWT_SECRET_CURRENT} -lt 32 ]; then
              sed -i '/^JWT_SECRET=/d' .env
              echo "JWT_SECRET=$(openssl rand -base64 48)" >> .env
              chmod 600 .env
              echo "✅ Generated JWT_SECRET in server .env"
            else
              echo "✅ JWT_SECRET already configured"
            fi
            upsert_env "PAYOS_CLIENT_ID" "$PAYOS_CLIENT_ID"
            upsert_env "PAYOS_API_KEY" "$PAYOS_API_KEY"
            upsert_env "PAYOS_CHECKSUM_KEY" "$PAYOS_CHECKSUM_KEY"
            upsert_env "GOOGLE_CLIENT_ID" "$GOOGLE_CLIENT_ID"
            upsert_env "CLIENT_URL" "${CLIENT_URL:-https://hilover.space}"
            upsert_env "PAYMENT_RETURN_ALLOWED_ORIGINS" "${PAYMENT_RETURN_ALLOWED_ORIGINS:-https://hilover.space,https://www.hilover.space}"
            upsert_env "FRONTEND_URL" "${FRONTEND_URL:-https://hilover.space}"
            upsert_env "FRONTEND_URLS" "${FRONTEND_URLS:-https://hilover.space,https://www.hilover.space}"
            GOOGLE_CLIENT_ID_CURRENT=$(grep -E '^GOOGLE_CLIENT_ID=' .env | tail -n 1 | cut -d= -f2- || true)
            if [ -z "$GOOGLE_CLIENT_ID_CURRENT" ]; then
              echo "⚠️ GOOGLE_CLIENT_ID is missing in runtime .env; Google login may fail"
            fi
            chmod 600 .env

            echo "☕ Verifying Java runtime..."
            if ! command -v java >/dev/null 2>&1; then
              sudo apt-get update
              sudo apt-get install -y openjdk-17-jre-headless
            fi

            echo "💾 Ensuring build swap..."
            if ! sudo swapon --show --noheadings | grep -q .; then
              if [ ! -f /swapfile ]; then
                sudo fallocate -l 1G /swapfile
                sudo chmod 600 /swapfile
                sudo mkswap /swapfile
              fi
              sudo swapon /swapfile
            fi
            if ! grep -q '^/swapfile ' /etc/fstab; then
              echo '/swapfile none swap sw 0 0' | sudo tee -a /etc/fstab >/dev/null
            fi
            free -h

            echo "🛠️  Building Spring Boot jar..."
            chmod +x ./mvnw
            export MAVEN_OPTS="-Xms64m -Xmx384m -XX:MaxMetaspaceSize=192m"
            ./mvnw clean package -DskipTests

            JAR_PATH=$(ls -1 target/hi-api-*.jar | head -n 1)
            if [ -z "$JAR_PATH" ] || [ ! -f "$JAR_PATH" ]; then
              echo "❌ Built jar not found in target/"
              ls -la target || true
              exit 1
            fi
            echo "✅ Built jar: $JAR_PATH"

            echo "🌱 Loading environment..."
            if [ -f .env ]; then
              set -a
              . ./.env
              set +a
            fi

            echo "♻️  Restarting PM2 (Java)..."
            if pm2 describe hi-api >/dev/null 2>&1; then
              pm2 delete hi-api
            fi
            pm2 start /usr/bin/java --name hi-api --update-env -- -jar "/home/${USER}/hi-app/$JAR_PATH"
            pm2 save
            pm2 status hi-api

            echo "✅ Health check..."
            for i in {1..15}; do
              if curl -fsS http://localhost:5000/health >/dev/null; then
                echo "✅ Health check passed"
                break
              fi
              echo "⏳ Waiting for app startup ($i/15)..."
              sleep 2
            done

            if ! curl -fsS http://localhost:5000/health >/dev/null; then
              echo "❌ Health check failed! Recent PM2 logs:"
              pm2 logs hi-api --lines 80 --nostream || true
              exit 1
            fi

            echo "🎉 Deploy BE hoàn tất!"
