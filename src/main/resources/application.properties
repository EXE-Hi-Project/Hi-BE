server.port=5000

# MongoDB
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/hi_app}
spring.data.mongodb.database=${MONGODB_DB_NAME:hi_app}

# JWT
app.jwt.secret=${JWT_SECRET:HiLover_Secret_2026_ChangeMe}
app.jwt.expiration-ms=${JWT_EXPIRES_MS:604800000}

# CORS
app.cors.allowed-origins=${FRONTEND_URL:http://localhost:5173},${FRONTEND_URLS:https://hilover.space,https://www.hilover.space}
app.cors.allow-vercel-preview=${ALLOW_VERCEL_PREVIEW:false}

# Admin
app.admin.emails=${ADMIN_EMAILS:admin@example.com}

# Google OAuth
app.google.client-id=${GOOGLE_CLIENT_ID:}

# AWS Bedrock
aws.region=${AWS_REGION:us-east-1}
aws.access-key-id=${AWS_ACCESS_KEY_ID:}
aws.secret-access-key=${AWS_SECRET_ACCESS_KEY:}
app.bedrock.model-id=${BEDROCK_MODEL_ID:anthropic.claude-3-haiku-20240307-v1:0}

# Logging
logging.level.com.hi=DEBUG
logging.level.org.springframework.security=WARN

# Jackson
spring.jackson.default-property-inclusion=non_null

# Email Configuration (Sử dụng Gmail)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:hilover.space@gmail.com}
# Mật khẩu ứng dụng (App Password) của Gmail, KHÔNG phải mật khẩu đăng nhập bình thường
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# PayOS
app.payos.client-id=${PAYOS_CLIENT_ID:}
app.payos.api-key=${PAYOS_API_KEY:}
app.payos.checksum-key=${PAYOS_CHECKSUM_KEY:}
app.client-url=${CLIENT_URL:http://localhost:5173}

# Springdoc / Swagger UI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=alpha
springdoc.swagger-ui.tagsSorter=alpha

# Affiliate marketing / TikTok Shop sync
app.affiliate.sync.enabled=${AFFILIATE_SYNC_ENABLED:false}
app.affiliate.sync.cron=${AFFILIATE_SYNC_CRON:0 0 */6 * * *}
app.affiliate.tiktok.products-url=${TIKTOK_PRODUCTS_URL:}
app.affiliate.tiktok.access-token=${TIKTOK_ACCESS_TOKEN:}
app.affiliate.tiktok.auth-header-name=${TIKTOK_AUTH_HEADER_NAME:Authorization}
app.affiliate.tiktok.auth-header-prefix=${TIKTOK_AUTH_HEADER_PREFIX:Bearer }
